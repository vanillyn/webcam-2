<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500&family=DM+Mono:wght@400&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --r: #e0304a;
                --r2: #f06070;
                --blsh: #ffc2cc;
                --crm: #fff3f5;
                --muted: #c8a0b0;
                --glass: rgba(16, 6, 10, 0.88);
                --bdr: rgba(224, 48, 74, 0.28);
                --shd: rgba(0, 0, 0, 0.45);
            }

            html,
            body {
                width: 380px;
                height: 900px;
                background: transparent;
                overflow: hidden;
                font-family: "DM Sans", sans-serif;
            }

            #msgs {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                gap: 4px;
                padding: 8px 8px 10px;
                overflow: hidden;
            }

            .msg {
                display: flex;
                flex-direction: column;
                gap: 2px;
                background: var(--glass);
                border: 1px solid var(--bdr);
                border-left: 2.5px solid var(--uc, var(--r2));
                border-radius: 11px;
                border-top-left-radius: 3px;
                padding: 7px 11px;
                opacity: 0;
                transform: translateX(-5px) scale(0.98);
                animation: msgIn 0.22s cubic-bezier(0.22, 1, 0.36, 1) forwards;
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                box-shadow: 0 2px 6px var(--shd);
                flex-shrink: 0;
            }
            @keyframes msgIn {
                to {
                    opacity: 1;
                    transform: translateX(0) scale(1);
                }
            }

            .usr {
                font-family: "DM Mono", monospace;
                font-size: 8px;
                letter-spacing: 0.1em;
                color: var(--uc, var(--blsh));
                text-transform: lowercase;
            }
            .txt {
                font-size: 12px;
                font-weight: 300;
                line-height: 1.5;
                color: var(--crm);
                word-break: break-word;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 2px;
            }
            .txt img.emote {
                height: 22px;
                width: auto;
                vertical-align: middle;
                display: inline-block;
                margin: 0 1px;
                image-rendering: auto;
            }

            #msgs .msg:nth-last-child(n + 8) {
                opacity: 0.38 !important;
                transition: opacity 0.4s;
            }
            #msgs .msg:nth-last-child(n + 13) {
                opacity: 0.14 !important;
            }
            #msgs .msg:nth-last-child(n + 18) {
                opacity: 0.04 !important;
            }
        </style>
    </head>
    <body>
        <div id="msgs"></div>
        <script>
            const msgs = document.getElementById("msgs");
            const MAX = 24;

            const USER_COLORS = [
                "#f06070",
                "#e0304a",
                "#ffc2cc",
                "#ff8fab",
                "#ffb3c6",
                "#f48fb1",
                "#ff6b9d",
                "#e0506a",
                "#ff9eb5",
                "#c86080",
            ];
            function clr(u) {
                let h = 0;
                for (const c of u) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
                return USER_COLORS[h % USER_COLORS.length];
            }
            function esc(s) {
                return s
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            const emoteCache = new Map();
            let globalEmotes = new Map();
            let emotesLoaded = false;

            async function loadGlobalEmotes() {
                try {
                    const r7 = await fetch(
                        "https://7tv.io/v3/emote-sets/global",
                    );
                    if (r7.ok) {
                        const d = await r7.json();
                        (d.emotes || []).forEach((e) => {
                            const url = `https://cdn.7tv.app/emote/${e.id}/2x.webp`;
                            globalEmotes.set(e.name, url);
                        });
                    }
                } catch {}
                try {
                    const rb = await fetch(
                        "https://api.betterttv.net/3/cached/emotes/global",
                    );
                    if (rb.ok) {
                        const d = await rb.json();
                        d.forEach((e) => {
                            const url = `https://cdn.betterttv.net/emote/${e.id}/2x`;
                            if (!globalEmotes.has(e.code))
                                globalEmotes.set(e.code, url);
                        });
                    }
                } catch {}
                emotesLoaded = true;
            }
            loadGlobalEmotes();

            function resolveEmote(word) {
                if (emoteCache.has(word)) return emoteCache.get(word);
                const url = globalEmotes.get(word) || null;
                emoteCache.set(word, url);
                return url;
            }

            function renderText(text) {
                const frag = document.createDocumentFragment();
                const words = text.split(/(\s+)/);
                words.forEach((w) => {
                    if (/^\s+$/.test(w)) {
                        frag.appendChild(document.createTextNode(" "));
                        return;
                    }
                    const url = emotesLoaded ? resolveEmote(w) : null;
                    if (url) {
                        const img = document.createElement("img");
                        img.className = "emote";
                        img.src = url;
                        img.alt = w;
                        img.title = w;
                        img.onerror = () => {
                            img.replaceWith(document.createTextNode(esc(w)));
                        };
                        frag.appendChild(img);
                    } else {
                        frag.appendChild(document.createTextNode(w));
                    }
                });
                return frag;
            }

            function add(user, text) {
                const c = clr(user);
                const el = document.createElement("div");
                el.className = "msg";
                el.style.setProperty("--uc", c);
                const usrEl = document.createElement("span");
                usrEl.className = "usr";
                usrEl.textContent = user;
                const txtEl = document.createElement("span");
                txtEl.className = "txt";
                txtEl.appendChild(renderText(text));
                el.appendChild(usrEl);
                el.appendChild(txtEl);
                msgs.appendChild(el);
                while (msgs.children.length > MAX)
                    msgs.removeChild(msgs.firstChild);
            }

            function applyWal(colors) {
                if (!colors || !colors.length) return;
                const c0 = colors[0] || "#e0304a";
                const c1 = colors[1] || "#f06070";
                const c3 = colors[3] || "#ffc2cc";
                const c7 = colors[7] || "#fff3f5";
                function hexToRgba(h, a) {
                    const r = parseInt(h.slice(1, 3), 16),
                        g = parseInt(h.slice(3, 5), 16),
                        b = parseInt(h.slice(5, 7), 16);
                    return `rgba(${r},${g},${b},${a})`;
                }
                const root = document.documentElement;
                root.style.setProperty("--r", c0);
                root.style.setProperty("--r2", c1);
                root.style.setProperty("--blsh", c3);
                root.style.setProperty("--crm", c7);
                root.style.setProperty("--bdr", hexToRgba(c0, 0.28));
                root.style.setProperty("--muted", hexToRgba(c3, 0.6));
            }
            function fetchWal() {
                fetch("/wal_colors.json?t=" + Date.now())
                    .then((r) => (r.ok ? r.json() : null))
                    .then((j) => {
                        if (j && j.colors) applyWal(j.colors);
                    })
                    .catch(() => {});
            }
            fetchWal();
            setInterval(fetchWal, 10000);

            let ws,
                delay = 1000;
            function connect() {
                ws = new WebSocket("ws://localhost:8877");
                ws.onopen = () => {
                    delay = 1000;
                };
                ws.onmessage = (e) => {
                    let msg;
                    try {
                        msg = JSON.parse(e.data);
                    } catch {
                        return;
                    }
                    if (msg.type === "init") {
                        (msg.state?.chat ?? []).forEach((m) =>
                            add(m.user, m.text),
                        );
                    } else if (msg.type === "chat") {
                        add(msg.user, msg.text);
                    }
                };
                ws.onclose = () => {
                    setTimeout(connect, delay);
                    delay = Math.min(delay * 1.5, 8000);
                };
                ws.onerror = () => ws.close();
            }
            connect();
        </script>
    </body>
</html>
