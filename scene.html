                margin: 0;
                padding: 0;

            html,
            body {
                width: 100%;
                height: 100%;
                background: transparent;
                overflow: hidden;
            }
            canvas {
                display: block;
                position: absolute;
                inset: 0;
            }
            #loading {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: monospace;
                color: #c84870;
                font-size: 13px;
                letter-spacing: 0.15em;
                background: transparent;
                pointer-events: none;
                z-index: 10;
                transition: opacity 0.8s;
            }
            #loading.done {
                opacity: 0;
                pointer-events: none;
            }
        </style>

        <div id="loading"></div>
        <script>
            function rng32(s) {
                return () => {
                    s |= 0;
                    s = (s + 0x6d2b79f5) | 0;
                    let t = Math.imul(s ^ (s >>> 15), 1 | s);
                    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
                };
            }
            const R = rng32(42);

            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,

            renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.setClearColor(0x000000, 0);

            let lightsOff = false;

            const lightsOffDuration = 120000;

            function setLightsOff(off) {
                lightsOff = off;
                if (off) {
                    if (lightsOffTimer) clearTimeout(lightsOffTimer);
                    lightsOffTimer = setTimeout(
                        () => setLightsOff(false),
                        lightsOffDuration,
                    );
                }
            }

            function cv(w, h) {
                const c = document.createElement("canvas");
                c.width = w;
                c.height = h;
                return c;
            }
            function mktex(canvas, wrap) {
                const t = new THREE.CanvasTexture(canvas);
                if (wrap) {
                    t.wrapS = t.wrapT = THREE.RepeatWrapping;
                }
                return t;
            }
            function lm(col) {
                return new THREE.MeshLambertMaterial({ color: col });
            }
            function pm(col) {
                return new THREE.MeshPhongMaterial({
                    color: col,
                    shininess: 60,
                });
            }
            function box(w, h, d, mat, x, y, z, par) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                m.position.set(x, y, z);
                m.castShadow = true;
                m.receiveShadow = true;
                (par || scene).add(m);
                return m;
            }

            const _disposables = [];
            function tracked(mesh) {
                _disposables.push(mesh);
                return mesh;
            }

            function makeWallTex() {
                const c = cv(512, 512);
                const x = c.getContext("2d");
                x.fillStyle = "#fff4f8";
                x.fillRect(0, 0, 512, 512);

                const rn = rng32(91);
                for (let i = 0; i < 4000; i++) {
                    const nx = rn() * 512,
                        ny = rn() * 512,
                        nr = 0.5 + rn() * 1.5;
                    x.fillStyle = `rgba(200,100,140,${0.01 + rn() * 0.025})`;
                    x.beginPath();
                    x.arc(nx, ny, nr, 0, Math.PI * 2);
                    x.fill();
                }

                x.strokeStyle = "rgba(224,48,74,0.04)";
                x.lineWidth = 1;
                for (let i = 0; i < 512; i += 48) {
                    x.beginPath();
                    x.moveTo(i, 0);
                    x.lineTo(i, 512);
                    x.stroke();
                    x.beginPath();
                    x.moveTo(0, i);
                    x.lineTo(512, i);
                    x.stroke();
                }

                const rh = rng32(21);
                for (let i = 0; i < 18; i++) {
                    const hx = rh() * 512,
                        hy = rh() * 512,
                        hs = 3 + rh() * 5;
                    x.save();
                    x.translate(hx, hy);
                    x.scale(hs / 14, hs / 14);
                    x.fillStyle = "rgba(224,48,74,0.06)";
                    x.beginPath();
                    x.moveTo(0, 4);
                    x.bezierCurveTo(-14, -4, -14, -16, 0, -14);
                    x.bezierCurveTo(14, -16, 14, -4, 0, 4);
                    x.fill();
                    x.restore();
                }
                const t = mktex(c, true);
                t.repeat.set(3, 3);
                return t;
            }
            function makeFloorTex() {
                const c = cv(512, 512);
                const x = c.getContext("2d");
                x.fillStyle = "#d4b090";
                x.fillRect(0, 0, 512, 512);

                const rw = rng32(3);
                const planks = [
                    [0, "#c8a07a"],
                    [128, "#d4aa84"],
                    [256, "#c0986e"],
                    [384, "#cca07a"],
                ];
                planks.forEach(([oy, col]) => {
                    x.fillStyle = col;
                    x.fillRect(0, oy, 512, 128);
                    x.strokeStyle = "rgba(100,60,20,0.22)";
                    x.lineWidth = 2;
                    x.strokeRect(0, oy, 512, 128);

                    x.strokeStyle = "rgba(120,70,30,0.10)";
                    x.lineWidth = 1;
                    for (let g = 0; g < 12; g++) {
                        const gy = oy + rw() * 128;
                        x.beginPath();
                        x.moveTo(0, gy);
                        x.bezierCurveTo(
                            128,
                            gy + rw() * 6 - 3,
                            384,
                            gy + rw() * 6 - 3,
                            512,
                            gy + rw() * 4 - 2,
                        );
                        x.stroke();
                    }

                    for (
                        let s = 64;
                        s < 512;
                        s += 128 + Math.floor(rw() * 40 - 20)
                    ) {
                        x.strokeStyle = "rgba(100,60,20,0.18)";
                        x.lineWidth = 1.5;
                        x.beginPath();
                        x.moveTo(s, oy);
                        x.lineTo(s, oy + 128);
                        x.stroke();
                    }
                });
                const t = mktex(c, true);
                t.repeat.set(3, 3);
                return t;
            }
            function makeRugTex() {
                const c = cv(256, 256);
                const x = c.getContext("2d");
                x.fillStyle = "#f0b8cc";
                x.fillRect(0, 0, 256, 256);

                [
                    [0, "rgba(224,48,74,0.35)", 110, 70],
                    [1, "rgba(255,160,180,0.25)", 90, 56],
                    [2, "rgba(200,30,60,0.18)", 70, 44],
                ].forEach(([i, col, rx, ry]) => {
                    x.strokeStyle = col;
                    x.lineWidth = 10 - i * 2;
                    x.beginPath();
                    x.ellipse(128, 128, rx, ry, 0, 0, Math.PI * 2);
                    x.stroke();
                });

                x.strokeStyle = "rgba(224,48,74,0.12)";
                x.lineWidth = 1;
                for (let i = -256; i < 512; i += 24) {
                    x.beginPath();
                    x.moveTo(i, 0);
                    x.lineTo(i + 256, 256);
                    x.stroke();
                    x.beginPath();
                    x.moveTo(i + 256, 0);
                    x.lineTo(i, 256);
                    x.stroke();
                }
                return mktex(c);
            }
            function makeDeskTex() {
                const c = cv(256, 128);
                const x = c.getContext("2d");
                x.fillStyle = "#c8a080";
                x.fillRect(0, 0, 256, 128);
                const rw = rng32(17);
                x.strokeStyle = "rgba(120,65,30,0.20)";
                x.lineWidth = 1.2;
                for (let i = 0; i < 14; i++) {
                    x.beginPath();
                    x.moveTo(0, rw() * 128);
                    x.lineTo(256, rw() * 128 + rw() * 8 - 4);
                    x.stroke();
                }

                x.fillStyle = "rgba(255,220,180,0.18)";
                x.fillRect(0, 0, 256, 8);
                const t = mktex(c, true);
                t.repeat.set(2, 1);
                return t;
            }
            function makeCurtainTex() {
                const c = cv(64, 256);
                const x = c.getContext("2d");
                const cg = x.createLinearGradient(0, 0, 64, 0);
                cg.addColorStop(0, "#e890a8");
                cg.addColorStop(0.5, "#ffb8cc");
                cg.addColorStop(1, "#e890a8");
                x.fillStyle = cg;
                x.fillRect(0, 0, 64, 256);

                for (let i = 0; i < 5; i++) {
                    const fg = x.createLinearGradient(
                        i * 13,
                        0,
                        i * 13 + 13,
                        0,
                    );
                    fg.addColorStop(0, "rgba(160,30,70,0.18)");
                    fg.addColorStop(0.5, "rgba(255,200,220,0.08)");
                    fg.addColorStop(1, "rgba(160,30,70,0.12)");
                    x.fillStyle = fg;
                    x.fillRect(i * 13, 0, 13, 256);
                }
                const rc = rng32(31);
                x.fillStyle = "rgba(255,255,255,0.15)";
                for (let i = 0; i < 20; i++) {
                    x.beginPath();
                    x.arc(rc() * 64, rc() * 256, 1.5, 0, Math.PI * 2);
                    x.fill();
                }
                return mktex(c, true);
            }
            function makeBedTex() {
                const c = cv(256, 256);
                const x = c.getContext("2d");
                x.fillStyle = "#f0b0c4";
                x.fillRect(0, 0, 256, 256);

                x.strokeStyle = "rgba(200,60,100,0.18)";
                x.lineWidth = 1.5;
                for (let i = 0; i < 256; i += 32) {
                    for (let j = 0; j < 256; j += 32) {
                        x.beginPath();
                        x.moveTo(i, j);
                        x.lineTo(i + 32, j + 32);
                        x.stroke();
                        x.beginPath();
                        x.moveTo(i + 32, j);
                        x.lineTo(i, j + 32);
                        x.stroke();
                    }
                }
                x.strokeStyle = "rgba(255,180,200,0.2)";
                x.lineWidth = 1;
                for (let i = 0; i < 256; i += 32) {
                    x.beginPath();
                    x.moveTo(0, i);
                    x.lineTo(256, i);
                    x.stroke();
                    x.beginPath();
                    x.moveTo(i, 0);
                    x.lineTo(i, 256);
                    x.stroke();
                }
                return mktex(c, true);
            }

            const wallMat = new THREE.MeshLambertMaterial({
                map: makeWallTex(),
            });
            const floorMat = new THREE.MeshLambertMaterial({
                map: makeFloorTex(),

            const bookColors = [

            const ceilMat = new THREE.MeshLambertMaterial({ color: 0xfff8fc });

            box(0.84, 0.56, 0.055, lm(0xf0e4ec), 0, 1.1, -0.26, deskG);
            const screenC = cv(400, 260);
            const sx = screenC.getContext("2d");
            {
                const sg = sx.createLinearGradient(0, 0, 400, 260);
                sg.addColorStop(0, "#1a0a10");

                sx.fillStyle = sg;

                const wg = sx.createRadialGradient(200, 130, 0, 200, 130, 200);

                sx.fillStyle = wg;

            }
            const screenMat = new THREE.MeshBasicMaterial({
                map: new THREE.CanvasTexture(screenC),
            });
            box(0.78, 0.5, 0.008, screenMat, 0, 1.1, -0.233, deskG);

            box(0.05, 0.22, 0.05, lm(0xe0d0d8), 0, 0.87, -0.26, deskG);
            box(0.32, 0.025, 0.24, lm(0xe0d0d8), 0, 0.76, -0.26, deskG);

            {
                const sm = new THREE.Group();
                sm.position.set(0.74, 0, -0.05);
                sm.rotation.y = -0.32;
                deskG.add(sm);
                box(0.52, 0.34, 0.05, lm(0xf0e4ec), 0, 1.02, -0.24, sm);
                const sc2 = cv(200, 130);
                const sx2 = sc2.getContext("2d");
                sx2.fillStyle = "#180810";
                sx2.fillRect(0, 0, 200, 130);
                sx2.fillStyle = "rgba(255,80,120,0.2)";
                sx2.fillRect(10, 10, 180, 110);
                sx2.strokeStyle = "rgba(255,100,140,0.3)";
                sx2.lineWidth = 1;

                tagX.textAlign = "center";
                tagX.textBaseline = "middle";
                tagX.fillText(username.slice(0, 14), 128, 24);
                const tagSprite = new THREE.Sprite(
                    new THREE.SpriteMaterial({
                        map: new THREE.CanvasTexture(tagC),
                        transparent: true,
                        depthWrite: false,
                    }),
                );
                tagSprite.scale.set(0.55, 0.1, 1);
                tagSprite.position.set(0, 0.36, 0);
                g.add(tagSprite);

                const pos = PLUSH_POSITIONS[posIdx];
                g.position.set(pos.x, 0.001, pos.z);
                g.scale.set(0, 0, 0);
                scene.add(g);

                let popT = 0;
                const popAnim = () => {
                    popT += 0.06;
                    const s = Math.min(
                        1,
                        popT < 0.5
                            ? popT * 2 * 1.1
                            : 1 +
                                  (popT - 0.5) *
                                      2 *
                                      (1 - 1.1) *
                                      (popT > 1 ? 0 : 1),
                    );
                    g.scale.setScalar(Math.max(0, s));
                    if (popT < 1.15) requestAnimationFrame(popAnim);
                    else g.scale.setScalar(1);
                };
                popAnim();

                return g;
            }

            function spawnPlushie(username) {
                if (plushies.has(username)) {
                    const p = plushies.get(username);
                    clearTimeout(p.timer);
                    p.timer = setTimeout(
                        () => removePlushie(username),
                        PLUSH_EXPIRE,
                    );

                    p.bounce = true;
                    return;
                }

                const free = PLUSH_POSITIONS.find((p) => !p.taken);
                if (!free) return;
                free.taken = true;
                const g = makePlushie(username, free.id);
                const timer = setTimeout(
                    () => removePlushie(username),
                    PLUSH_EXPIRE,
                );
                plushies.set(username, {
                    group: g,
                    posIdx: free.id,
                    timer,
                    bounce: false,
                    bounceT: 0,
                });
            }

            function removePlushie(username) {
                if (!plushies.has(username)) return;
                const p = plushies.get(username);
                clearTimeout(p.timer);
                PLUSH_POSITIONS[p.posIdx].taken = false;

                let shrT = 0;
                const shrink = () => {
                    shrT += 0.05;
                    const s = Math.max(0, 1 - shrT);
                    p.group.scale.setScalar(s);
                    if (shrT < 1) requestAnimationFrame(shrink);
                    else {
                        scene.remove(p.group);
                        p.group.traverse((child) => {
                            if (child.isMesh || child.isSprite) {
                                if (child.geometry) child.geometry.dispose();
                                if (child.material) {
                                    if (child.material.map)
                                        child.material.map.dispose();
                                    child.material.dispose();
                                }
                            }
                        });
                    }
                };
                shrink();
                plushies.delete(username);
            }

            const loadingEl = document.getElementById("loading");
            const txLoader = new THREE.TextureLoader();
            function loadTex(url) {
                const t = txLoader.load(url);
                t.encoding = THREE.sRGBEncoding;
                t.flipY = false;
                return t;
            }
            const tex01 = loadTex("9002630_01.png");
            const tex02 = loadTex("9002630_02.png");
            const tex03 = loadTex("9002630_03.png");

            function pickTex(matName, meshName, idx) {
                const n = (matName + meshName).toLowerCase();
                if (
                    n.includes("01") ||
                    n.includes("body") ||
                    n.includes("skin") ||
                    n.includes("face")
                )
                    return tex01;
                if (
                    n.includes("02") ||
                    n.includes("cloth") ||
                    n.includes("outfit") ||
                    n.includes("dress")
                )
                    return tex02;
                if (n.includes("03") || n.includes("hair") || n.includes("acc"))
                    return tex03;
                return [tex01, tex02, tex03][idx % 3];
            }

            function applyTextures(fbx) {
                let mi = 0;
                fbx.traverse((child) => {
                    if (!child.isMesh) return;
                    child.castShadow = true;
                    child.receiveShadow = true;
                    const applyMat = (m) => {
                        const chosenTex =
                            m.map && m.map.image
                                ? m.map
                                : pickTex(m.name || "", child.name || "", mi);
                        return new THREE.MeshLambertMaterial({
                            map: chosenTex,
                            color: 0xffffff,
                            transparent: m.transparent || false,
                            alphaTest: m.alphaTest || 0,
                            opacity: m.opacity != null ? m.opacity : 1,
                            side: m.side || THREE.FrontSide,
                            skinning: true,
                        });
                    };
                    child.material = Array.isArray(child.material)
                        ? child.material.map(applyMat)
                        : applyMat(child.material);
                    mi++;
                });
            }

            let mixer;
            function loadFBX() {
                if (!THREE.FBXLoader) {
                    loadingEl.textContent = "FBXLoader unavailable";
                    setTimeout(() => loadingEl.classList.add("done"), 2000);
                    return;
                }
                const loader = new THREE.FBXLoader();
                loader.load(
                    "Valentine_s_Mika.fbx",
                    (fbx) => {
                        fbx.scale.setScalar(0.0013);
                        fbx.position.set(-0.1, 0, 0.42);
                        fbx.rotation.y = Math.PI;
                        applyTextures(fbx);
                        if (fbx.animations && fbx.animations.length > 0) {
                            mixer = new THREE.AnimationMixer(fbx);
                            fbx.animations.forEach((clip) => {
                                mixer.clipAction(clip).play();
                            });
                            mixer.update(0);
                            fbx.animations.forEach((clip) => {
                                mixer.clipAction(clip).stop();
                            });
                        }
                        scene.add(fbx);
                        loadingEl.classList.add("done");
                    },
                    (xhr) => {
                        if (xhr.total > 0)
                            loadingEl.textContent = `loading… ${Math.round((xhr.loaded / xhr.total) * 100)}%`;
                    },
                    (err) => {
                        console.error(err);
                        loadingEl.textContent = "model load failed";
                        setTimeout(() => loadingEl.classList.add("done"), 4000);
                    },
                );
            }

            let wsConn,
                wsDelay = 1000;
            function wsConnect() {
                wsConn = new WebSocket("ws://localhost:8877");
                wsConn.onopen = () => {
                    wsDelay = 1000;
                };
                wsConn.onmessage = (e) => {
                    let msg;
                    try {
                        msg = JSON.parse(e.data);
                    } catch {
                        return;
                    }

                    if (msg.type === "init") {
                        const mode = msg.state?.scene ?? "live";
                        if (MODES[mode]) {
                            fromM = { ...MODES[curMode] };
                            toM = { ...MODES[mode] };
                            curMode = mode;
                            modeT = 0;
                        }

                        (msg.state?.chat ?? []).forEach((m) =>
                            spawnPlushie(m.user),
                        );
                    }

                    if (
                        msg.type === "scene" &&
                        MODES[msg.value] &&
                        msg.value !== curMode
                    ) {
                        fromM = { ...MODES[curMode] };
                        toM = { ...MODES[msg.value] };
                        curMode = msg.value;
                        modeT = 0;
                    }

                    if (msg.type === "chat") {
                        spawnPlushie(msg.user);
                    }

                    if (msg.type === "lightsoff") {
                        setLightsOff(true);
                    }
                    if (msg.type === "lightson") {
                        setLightsOff(false);
                    }
                };
                wsConn.onclose = () => {
                    setTimeout(wsConnect, wsDelay);
                    wsDelay = Math.min(wsDelay * 1.5, 8000);
                };
                wsConn.onerror = () => wsConn.close();
            }
            wsConnect();

            const clock = new THREE.Clock();
            (function tick() {
                requestAnimationFrame(tick);
                const dt = clock.getDelta();
                const t = clock.elapsedTime;

                if (modeT < 1) {
                    modeT = Math.min(1, modeT + 0.003);
                    const lp = (a, b, f) => a + (b - a) * f;
                    scene.background = new THREE.Color(fromM.sky).lerp(
                        new THREE.Color(toM.sky),
                        modeT,
                    );
                    scene.fog.color.set(
                        new THREE.Color(fromM.fogC).lerp(
                            new THREE.Color(toM.fogC),
                            modeT,
                        ),
                    );
                    scene.fog.near = lp(fromM.fogN, toM.fogN, modeT);
                    scene.fog.far = lp(fromM.fogF, toM.fogF, modeT);
                    ambL.intensity = lp(fromM.amb, toM.amb, modeT);
                    ambL.color.set(
                        new THREE.Color(fromM.ambC).lerp(
                            new THREE.Color(toM.ambC),
                            modeT,
                        ),
                    );
                    sunL.intensity = lp(fromM.key, toM.key, modeT);
                    sunL.color.set(
                        new THREE.Color(fromM.keyC).lerp(
                            new THREE.Color(toM.keyC),
                            modeT,
                        ),
                    );
                    fillL.intensity = lp(fromM.fillI, toM.fillI, modeT);
                    fillL.color.set(
                        new THREE.Color(fromM.fill).lerp(
                            new THREE.Color(toM.fill),
                            modeT,
                        ),
                    );
                    rimL.intensity = lp(fromM.rimI, toM.rimI, modeT);
                    rimL.color.set(
                        new THREE.Color(fromM.rim).lerp(
                            new THREE.Color(toM.rim),
                            modeT,
                        ),
                    );
                    lampL.color.set(
                        new THREE.Color(fromM.lamp).lerp(
                            new THREE.Color(toM.lamp),
                            modeT,
                        ),
                    );
                    monL.color.set(
                        new THREE.Color(fromM.mon).lerp(
                            new THREE.Color(toM.mon),
                            modeT,
                        ),
                    );
                    monL.intensity = lp(fromM.monI, toM.monI, modeT);
                }

                if (mixer) mixer.update(dt);

                const lightsScale = lightsOff ? 0.04 : 1.0;
                const targetLampI = (toM.lampI || 1.6) * lightsScale;
                lampL.intensity += (targetLampI - lampL.intensity) * 0.05;
                const targetCeilI = 0.6 * lightsScale;
                ceilL.intensity += (targetCeilI - ceilL.intensity) * 0.05;

                const fairyOn = toM.fairy && !lightsOff;
                fairyLights.forEach((fl, i) => {
                    const v = fairyOn
                        ? 0.55 + Math.sin(t * 2.4 + fl.ph) * 0.45
                        : 0;
                    const targetV = fairyOn ? v : 0;
                    fl.mesh.material.color.setHSL(
                        fl.baseH,
                        0.9,
                        targetV * 0.85,
                    );
                    fl.light.intensity +=
                        (targetV * 0.12 - fl.light.intensity) * 0.08;
                });

                if (!lightsOff)
                    lampL.intensity +=
                        Math.sin(t * 7.1) * 0.04 + Math.sin(t * 19.3) * 0.015;

                const spkActive =
                    (curMode === "live" || curMode === "starting") &&
                    !lightsOff;
                particles.forEach((p) => {
                    const d = p.userData;
                    if (spkActive) {
                        p.position.y += d.dy;
                        p.position.x += Math.sin(t * d.sp + d.ph) * 0.0007;
                        if (p.position.y > 3.5) {
                            p.position.y = 0.4;
                        }
                        const rise = (p.position.y - 0.4) / 3.1;
                        p.material.opacity = Math.sin(rise * Math.PI) * 0.45;
                    } else {
                        p.material.opacity = Math.max(
                            0,
                            p.material.opacity - 0.02,
                        );
                    }
                });

                plushies.forEach((p) => {
                    if (p.bounce) {
                        p.bounceT = (p.bounceT || 0) + 0.15;
                        const by =
                            Math.abs(Math.sin(p.bounceT)) *
                            0.08 *
                            Math.exp(-p.bounceT * 0.3);
                        p.group.position.y = by;
                        if (p.bounceT > 3) {
                            p.bounce = false;
                            p.bounceT = 0;
                            p.group.position.y = 0;
                        }
                    }

                    p.group.position.y +=
                        (Math.sin(t * 0.8 + p.posIdx) * 0.008 -
                            p.group.position.y) *
                        0.05;
                    p.group.rotation.y =
                        Math.sin(t * 0.4 + p.posIdx * 0.7) * 0.06;
                });

                camera.position.x = Math.sin(t * 0.018) * 0.1;
                camera.position.y = 1.58 + Math.sin(t * 0.032) * 0.035;
                camera.lookAt(0, 1.1, 0);

                renderer.render(scene, camera);
            })();

            window.addEventListener("resize", () => {
                camera.aspect = innerWidth / innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(innerWidth, innerHeight);
            });
        </script>
    </body>
</html>
