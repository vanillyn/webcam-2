<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=1920" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --r: #e0304a;
                --r2: #f06070;
                --blsh: #ffc2cc;
                --crm: #fff3f5;
                --dk: #3a1020;
                --glass: rgba(16, 6, 10, 0.88);
                --bdr: rgba(224, 48, 74, 0.28);
                --shd: rgba(0, 0, 0, 0.45);
                --muted: rgba(255, 180, 200, 0.55);
            }

            html,
            body {
                width: 1920px;
                height: 1080px;
                background: transparent;
                overflow: hidden;
                font-family: "DM Sans", sans-serif;
            }

            #strip {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 110px;
                display: flex;
                align-items: flex-end;
                padding: 0 36px 24px;
                gap: 16px;
                justify-content: space-between;
            }
            #strip::before {
                content: "";
                position: absolute;
                top: 0;
                left: 36px;
                right: 36px;
                height: 1px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    var(--bdr),
                    rgba(255, 194, 204, 0.3),
                    var(--bdr),
                    transparent
                );
            }

            #music {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 11px 15px;
                background: var(--glass);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border: 1px solid var(--bdr);
                border-radius: 18px;
                box-shadow: 0 4px 16px var(--shd);
                max-width: 420px;
                min-width: 220px;
                opacity: 0;
                transform: translateY(10px);
                transition:
                    opacity 0.45s,
                    transform 0.45s,
                    border-color 0.6s,
                    box-shadow 0.6s;
            }
            #music.vis {
                opacity: 1;
                transform: translateY(0);
            }
            #music.pau {
                opacity: 1;
            }

            #art-wrap {
                width: 52px;
                height: 52px;
                flex-shrink: 0;
                border-radius: 10px;
                overflow: hidden;
                border: 1px solid var(--bdr);
                background: #1e0814;
                position: relative;
                transition: border-color 0.6s;
            }
            #album-art {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: none;
            }
            #art-ph {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #art-ph svg {
                width: 20px;
                height: 20px;
                opacity: 0.3;
            }

            #bars {
                display: flex;
                align-items: flex-end;
                gap: 3px;
                height: 16px;
                flex-shrink: 0;
            }
            .bar {
                width: 3px;
                border-radius: 2px;
                height: var(--h, 50%);
                background: linear-gradient(to top, var(--r), var(--blsh));
                animation: bnc var(--d, 0.8s) ease-in-out infinite alternate;
                transition: background 0.6s;
            }
            @keyframes bnc {
                from {
                    transform: scaleY(0.12);
                }
                to {
                    transform: scaleY(1);
                }
            }
            #music.pau .bar {
                animation: none;
                transform: scaleY(0.12);
            }

            #minfo {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            #mlbl {
                font-family: "DM Mono", monospace;
                font-size: 7px;
                letter-spacing: 0.24em;
                text-transform: uppercase;
                color: var(--blsh);
                opacity: 0.7;
            }
            #mtitle {
                font-size: 13px;
                font-weight: 700;
                color: var(--crm);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            #martist {
                font-size: 11px;
                font-weight: 300;
                color: var(--muted);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            #msgcard {
                background: var(--glass);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border: 1px solid var(--bdr);
                border-radius: 16px;
                border-bottom-right-radius: 4px;
                padding: 14px 20px;
                box-shadow: 0 4px 16px var(--shd);
                max-width: 580px;
                min-width: 180px;
                opacity: 0;
                transform: translateX(12px);
                transition:
                    opacity 0.38s,
                    transform 0.38s,
                    border-color 0.6s;
                position: relative;
                overflow: hidden;
            }
            #msgcard::after {
                content: "♡";
                position: absolute;
                top: 6px;
                right: 10px;
                font-size: 10px;
                color: var(--r2);
                opacity: 0.45;
                line-height: 1;
            }
            #msgcard.vis {
                opacity: 1;
                transform: translateX(0);
            }

            #msgtext {
                font-size: 20px;
                font-weight: 300;
                line-height: 1.55;
                color: var(--crm);
                letter-spacing: 0.012em;
                text-align: right;
                position: relative;
                z-index: 1;
                min-height: 1.55em;
                text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
            }
            #csr {
                display: inline-block;
                width: 2px;
                height: 0.9em;
                background: var(--blsh);
                margin-left: 3px;
                vertical-align: text-bottom;
                border-radius: 1px;
                animation: blnk 1.1s step-end infinite;
                transition: background 0.6s;
            }
            @keyframes blnk {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }

            #alerts {
                position: absolute;
                bottom: 130px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                pointer-events: none;
                z-index: 10;
            }

            .alert {
                display: flex;
                align-items: center;
                gap: 12px;
                background: var(--glass);
                backdrop-filter: blur(28px);
                -webkit-backdrop-filter: blur(28px);
                border: 1px solid var(--bdr);
                border-radius: 20px;
                padding: 14px 24px;
                box-shadow:
                    0 8px 32px var(--shd),
                    0 0 0 1px rgba(255, 180, 200, 0.08);
                min-width: 340px;
                max-width: 620px;
                opacity: 0;
                transform: translateY(20px) scale(0.94);
                animation:
                    alertIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                    alertOut 0.35s ease-in var(--dur, 5s) forwards;
            }
            @keyframes alertIn {
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            @keyframes alertOut {
                to {
                    opacity: 0;
                    transform: translateY(-10px) scale(0.96);
                }
            }

            .alert-body {
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .alert-type {
                font-family: "DM Mono", monospace;
                font-size: 7.5px;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: var(--blsh);
                opacity: 0.7;
            }
            .alert-msg {
                font-size: 18px;
                font-weight: 500;
                color: var(--crm);
                line-height: 1.3;
            }
            .alert-sub {
                font-size: 12px;
                font-weight: 300;
                color: var(--muted);
            }

            .alert::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: inherit;
                background: linear-gradient(
                    105deg,
                    transparent 40%,
                    rgba(255, 180, 200, 0.07) 50%,
                    transparent 60%
                );
                animation: shimmer 2.5s linear infinite;
            }
            @keyframes shimmer {
                from {
                    transform: translateX(-100%);
                }
                to {
                    transform: translateX(200%);
                }
            }
        </style>
    </head>
    <body>
        <div id="strip">
            <div id="music">
                <div id="art-wrap">
                    <img id="album-art" alt="" />
                    <div id="art-ph">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="#e0304a"
                            stroke-width="1.6"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path d="M9 18V5l12-2v13" />
                            <circle cx="6" cy="18" r="3" />
                            <circle cx="18" cy="16" r="3" />
                        </svg>
                    </div>
                </div>
                <div id="bars">
                    <div class="bar" style="--h: 60%; --d: 0.72s"></div>
                    <div class="bar" style="--h: 38%; --d: 0.96s"></div>
                    <div class="bar" style="--h: 82%; --d: 0.62s"></div>
                    <div class="bar" style="--h: 50%; --d: 1.06s"></div>
                    <div class="bar" style="--h: 70%; --d: 0.8s"></div>
                </div>
                <div id="minfo">
                    <span id="mlbl">now playing</span>
                    <span id="mtitle">—</span>
                    <span id="martist">—</span>
                </div>
            </div>

            <div id="msgcard">
                <div id="msgtext"><span id="csr"></span></div>
            </div>
        </div>

        <div id="alerts"></div>

        <script>
            const $ = (id) => document.getElementById(id);
            const music = $("music"),
                albumArt = $("album-art"),
                artPH = $("art-ph");
            const mtitle = $("mtitle"),
                martist = $("martist"),
                mlbl = $("mlbl");
            const msgcard = $("msgcard"),
                msgtext = $("msgtext");
            const alertsEl = $("alerts");
            let artPoll = null;

            function mkCsr() {
                const s = document.createElement("span");
                s.id = "csr";
                return s;
            }

            function loadArt() {
                const url = "/art.png?t=" + Date.now();
                const img = new Image();
                img.onload = () => {
                    albumArt.src = url;
                    albumArt.style.display = "block";
                    artPH.style.display = "none";
                };
                img.onerror = () => {
                    albumArt.style.display = "none";
                    artPH.style.display = "flex";
                };
                img.src = url;
            }

            let walPoll = null;
            function applyWal(colors) {
                if (!colors || !colors.length) return;

                const c0 = colors[0] || "#e0304a";
                const c1 = colors[1] || "#f06070";
                const c3 = colors[3] || "#ffc2cc";
                const c7 = colors[7] || "#fff3f5";

                function hexToRgba(h, a) {
                    const r = parseInt(h.slice(1, 3), 16),
                        g = parseInt(h.slice(3, 5), 16),
                        b = parseInt(h.slice(5, 7), 16);
                    return `rgba(${r},${g},${b},${a})`;
                }

                const root = document.documentElement;
                root.style.setProperty("--r", c0);
                root.style.setProperty("--r2", c1);
                root.style.setProperty("--blsh", c3);
                root.style.setProperty("--crm", c7);
                root.style.setProperty("--bdr", hexToRgba(c0, 0.3));
                root.style.setProperty("--muted", hexToRgba(c3, 0.6));
            }

            function fetchWal() {
                fetch("/wal_colors.json?t=" + Date.now())
                    .then((r) => (r.ok ? r.json() : null))
                    .then((j) => {
                        if (j && j.colors) applyWal(j.colors);
                    })
                    .catch(() => {});
            }
            fetchWal();
            walPoll = setInterval(fetchWal, 10000);

            function setMessage(val) {
                if (val) {
                    msgtext.textContent = val;
                    msgtext.appendChild(mkCsr());
                    msgcard.classList.add("vis");
                } else {
                    msgtext.innerHTML = "";
                    msgtext.appendChild(mkCsr());
                    msgcard.classList.remove("vis");
                }
            }

            function setMusic(title, artist, playing) {
                mtitle.textContent = title || "—";
                martist.textContent = artist || "";
                mlbl.textContent = playing ? "now playing" : "paused";
                if (playing) {
                    music.classList.remove("pau");
                    if (!artPoll) artPoll = setInterval(loadArt, 3000);
                    loadArt();
                } else {
                    music.classList.add("pau");
                    clearInterval(artPoll);
                    artPoll = null;
                }
                music.classList.add("vis");
            }

            const ALERT_DUR = 6000;
            const ALERT_TYPES = {
                follow: { icon: "♡", label: "new follower" },
                raid: { icon: "⚡", label: "incoming raid" },
                sub: { icon: "★", label: "new subscriber" },
                resub: { icon: "✦", label: "resubscribed" },
                bits: { icon: "◆", label: "cheered bits" },
                status: { icon: "◎", label: "status update" },
            };

            function showAlert(type, message, sub = "") {
                const def = ALERT_TYPES[type] || { icon: "◈", label: type };
                const el = document.createElement("div");
                el.className = "alert";
                el.style.setProperty("--dur", ALERT_DUR + "ms");
                el.innerHTML = `
    <div class="alert-body">
      <span class="alert-type">${def.label}</span>
      <span class="alert-msg">${message}</span>
      ${sub ? `<span class="alert-sub">${sub}</span>` : ""}
    </div>`;
                alertsEl.appendChild(el);
                setTimeout(() => {
                    el.addEventListener(
                        "animationend",
                        (ev) => {
                            if (ev.animationName === "alertOut") el.remove();
                        },
                        { once: true },
                    );

                    setTimeout(() => el.remove(), 700);
                }, ALERT_DUR);
            }

            let ws,
                delay = 1000;
            function connect() {
                ws = new WebSocket("ws://localhost:8877");
                ws.onopen = () => {
                    delay = 1000;
                };
                ws.onmessage = (e) => {
                    let msg;
                    try {
                        msg = JSON.parse(e.data);
                    } catch {
                        return;
                    }

                    if (msg.type === "init") {
                        const s = msg.state || {};
                        setMessage(s.message || "");
                        const m = s.music || {};
                        if (m.title && m.title !== "—")
                            setMusic(m.title, m.artist, m.playing);
                    } else if (msg.type === "message") {
                        setMessage(msg.value);
                    } else if (msg.type === "music") {
                        if (msg.title && msg.title !== "—")
                            setMusic(msg.title, msg.artist, msg.playing);
                    } else if (msg.type === "alert") {
                        showAlert(msg.alert, msg.message || "", msg.sub || "");
                    } else if (msg.type === "status") {
                        showAlert("status", msg.value);
                    } else if (msg.type === "follow") {
                        showAlert("follow", msg.user);
                    } else if (msg.type === "raid") {
                        showAlert(
                            "raid",
                            msg.user,
                            `${msg.viewers || 0} viewers`,
                        );
                    }
                };
                ws.onclose = () => {
                    setTimeout(connect, delay);
                    delay = Math.min(delay * 1.5, 8000);
                };
                ws.onerror = () => ws.close();
            }
            connect();
            loadArt();
        </script>
    </body>
</html>
